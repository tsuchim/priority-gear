name: CI

on:
  push:
    branches:
      - main
      - devel
  pull_request:
    branches:
      - main
      - devel

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PriorityGear.slnx

      - name: Build
        run: dotnet build PriorityGear.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test PriorityGear.slnx --configuration Release --no-build
