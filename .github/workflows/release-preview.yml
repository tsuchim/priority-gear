name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-preview:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PriorityGear.slnx

      - name: Build
        run: dotnet build PriorityGear.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test PriorityGear.slnx --configuration Release --no-build

      - name: Package release
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: >
          .\scripts\package-release.ps1
          -TagName "$env:TAG_NAME"
          -OutputDirectory ".\artifacts\release-preview"

      - name: Inspect release artifacts
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: >
          .\scripts\inspect-release-artifacts.ps1
          -ArtifactDirectory ".\artifacts\release-preview"
          -TagName "$env:TAG_NAME"

      - name: Publish public release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $tag = $env:TAG_NAME
          if ($tag -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+$' -or $tag.Contains("..") -or $tag.Contains("/") -or $tag.Contains("\")) {
            throw "Tag does not match safe release pattern: $tag"
          }

          $notes = "docs/release-drafts/$tag.md"
          if (!(Test-Path -LiteralPath $notes)) {
            throw "Missing tag-specific release notes: $notes"
          }

          $existingRelease = gh release view $tag --json tagName 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw "Release already exists for tag: $tag"
          }

          $releaseArgs = @(
            "release", "create", $tag,
            "--verify-tag",
            "--title", "PriorityGear $tag - GitHub installer release",
            "--notes-file", $notes,
            ".\artifacts\release-preview\PriorityGear-$tag-win-x64-installer.zip",
            ".\artifacts\release-preview\PriorityGear-$tag-SHA256SUMS.txt"
          )

          gh @releaseArgs
